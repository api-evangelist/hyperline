description: >-
  FinOps view of Hyperline platform spend. Hyperline charges a flat monthly
  platform fee plus a percentage of revenue processed through the platform
  (0.6% on Quote to Cash, 0.7% on Quote to Cash + Usage), with optional
  per-integration add-ons and a custom High Volume tier. Beyond being a cost
  itself, Hyperline is also a system of record for a customer's own usage-based
  billing, exposing meters, invoices, payments, and credits that feed downstream
  FinOps and revenue reporting.
notes: >-
  Percentage-of-revenue charges scale with processed billing volume; model the
  platform fee plus the revenue percentage against expected throughput. Verify
  current rates on the Hyperline pricing page during reconciliation.
