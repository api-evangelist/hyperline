meters:
- name: platform_fee
  description: Flat monthly subscription fee per Hyperline plan tier.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: revenue_percentage
  description: Percentage of revenue processed through the platform (0.6%-0.7% by tier).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - plan
- name: integration_addon
  description: Per-integration monthly add-on for CRM and accounting connectors.
  unit: integrations
  aggregation: sum
  dimensions:
  - account
  - integration
- name: invoices
  description: Invoices issued; tiers include a quota with overage on lower plans.
  unit: invoices
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track Hyperline platform fee plus the revenue-percentage charge against processed billing volume; export usage and invoice data via the API.
- name: Allocation
  description: Tag customers, products, and subscriptions to map Hyperline-billed revenue to internal cost centers and product lines.
- name: Optimization
  description: Right-size the plan tier to processed volume; consolidate integrations; use batch endpoints and the High Volume tier above $5M ARR to optimize per-invoice cost.
- name: Accountability
  description: Review the monthly platform fee plus revenue-percentage charge against forecasted billing throughput; assign owners per billing entity.
