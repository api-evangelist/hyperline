aid: hyperline
url: https://raw.githubusercontent.com/api-evangelist/hyperline/refs/heads/main/apis.yml
name: Hyperline
kind: company
description: Hyperline is a usage-based billing and subscription platform that helps
  B2B SaaS companies manage their entire quote-to-cash workflow. Its REST API covers
  customers, a product and plan catalog, subscriptions, real-time usage and event
  ingestion, invoicing, payments, credit notes, and webhooks for hybrid pricing models
  combining subscription and metered charges.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Billing
- Subscriptions
- Usage-Based
- Metering
- Payments
- Invoicing
- FinOps
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
